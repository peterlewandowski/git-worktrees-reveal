name: Deploy presentation to GitHub Pages

on:
  push:
    branches:
      - main
      - codex/human-visual-refresh
      - codex/ver3-ide-mockups
      - codex/ver4-ai-copilot-worktrees
      - codex/ver5-agent-swarm-worktrees
      - codex/ver6-review-lab-worktrees
      - codex/ver7-agent-workflows
      - codex/ver8-concise-closing
      - codex/ver9-agentic-ai
      - codex/ver10-agentic-work-lanes
      - codex/ver11-copilot-worktree-lanes
      - codex/ver12-task-separation
      - codex/ver13-official-resources
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-deck

      - name: Check out visual refresh presentation
        uses: actions/checkout@v4
        with:
          ref: codex/human-visual-refresh
          path: human-visual-refresh

      - name: Check out IDE mockup presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver3-ide-mockups
          path: ver3-ide-mockups

      - name: Check out AI productivity presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver4-ai-copilot-worktrees
          path: ver4-ai-copilot-worktrees

      - name: Check out agent lanes presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver5-agent-swarm-worktrees
          path: ver5-agent-swarm-worktrees

      - name: Check out review lab presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver6-review-lab-worktrees
          path: ver6-review-lab-worktrees

      - name: Check out final candidate agent workflow presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver7-agent-workflows
          path: ver7-agent-workflows

      - name: Check out concise final slide presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver8-concise-closing
          path: ver8-concise-closing

      - name: Check out agentic AI presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver9-agentic-ai
          path: ver9-agentic-ai

      - name: Check out agentic work lanes presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver10-agentic-work-lanes
          path: ver10-agentic-work-lanes

      - name: Check out Copilot worktree lanes presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver11-copilot-worktree-lanes
          path: ver11-copilot-worktree-lanes

      - name: Check out task separation presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver12-task-separation
          path: ver12-task-separation

      - name: Check out official resources presentation
        uses: actions/checkout@v4
        with:
          ref: codex/ver13-official-resources
          path: ver13-official-resources

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            main-deck/package-lock.json
            human-visual-refresh/package-lock.json
            ver3-ide-mockups/package-lock.json
            ver4-ai-copilot-worktrees/package-lock.json
            ver5-agent-swarm-worktrees/package-lock.json
            ver6-review-lab-worktrees/package-lock.json
            ver7-agent-workflows/package-lock.json
            ver8-concise-closing/package-lock.json
            ver9-agentic-ai/package-lock.json
            ver10-agentic-work-lanes/package-lock.json
            ver11-copilot-worktree-lanes/package-lock.json
            ver12-task-separation/package-lock.json
            ver13-official-resources/package-lock.json

      - name: Install main presentation dependencies
        run: npm ci
        working-directory: main-deck

      - name: Build main presentation
        run: npm run build
        working-directory: main-deck

      - name: Install visual refresh dependencies
        run: npm ci
        working-directory: human-visual-refresh

      - name: Build visual refresh presentation
        run: npm run build
        working-directory: human-visual-refresh

      - name: Install IDE mockup dependencies
        run: npm ci
        working-directory: ver3-ide-mockups

      - name: Build IDE mockup presentation
        run: npm run build
        working-directory: ver3-ide-mockups

      - name: Install AI productivity dependencies
        run: npm ci
        working-directory: ver4-ai-copilot-worktrees

      - name: Build AI productivity presentation
        run: npm run build
        working-directory: ver4-ai-copilot-worktrees

      - name: Install agent lanes dependencies
        run: npm ci
        working-directory: ver5-agent-swarm-worktrees

      - name: Build agent lanes presentation
        run: npm run build
        working-directory: ver5-agent-swarm-worktrees

      - name: Install review lab dependencies
        run: npm ci
        working-directory: ver6-review-lab-worktrees

      - name: Build review lab presentation
        run: npm run build
        working-directory: ver6-review-lab-worktrees

      - name: Install final candidate agent workflow dependencies
        run: npm ci
        working-directory: ver7-agent-workflows

      - name: Build final candidate agent workflow presentation
        run: npm run build
        working-directory: ver7-agent-workflows

      - name: Install concise final slide dependencies
        run: npm ci
        working-directory: ver8-concise-closing

      - name: Build concise final slide presentation
        run: npm run build
        working-directory: ver8-concise-closing

      - name: Install agentic AI presentation dependencies
        run: npm ci
        working-directory: ver9-agentic-ai

      - name: Build agentic AI presentation
        run: npm run build
        working-directory: ver9-agentic-ai

      - name: Install agentic work lanes presentation dependencies
        run: npm ci
        working-directory: ver10-agentic-work-lanes

      - name: Build agentic work lanes presentation
        run: npm run build
        working-directory: ver10-agentic-work-lanes

      - name: Install Copilot worktree lanes presentation dependencies
        run: npm ci
        working-directory: ver11-copilot-worktree-lanes

      - name: Build Copilot worktree lanes presentation
        run: npm run build
        working-directory: ver11-copilot-worktree-lanes

      - name: Install task separation presentation dependencies
        run: npm ci
        working-directory: ver12-task-separation

      - name: Build task separation presentation
        run: npm run build
        working-directory: ver12-task-separation

      - name: Install official resources presentation dependencies
        run: npm ci
        working-directory: ver13-official-resources

      - name: Build official resources presentation
        run: npm run build
        working-directory: ver13-official-resources

      - name: Compose Pages site
        run: |
          mkdir -p site/ver1 site/ver2 site/ver3 site/ver4 site/ver5 site/ver6 site/ver7 site/ver8 site/ver9 site/ver10 site/ver11 site/ver12 site/ver13 site/human-visual-refresh
          cp -R main-deck/dist/. site/
          cp -R main-deck/dist/. site/ver1/
          cp -R human-visual-refresh/dist/. site/ver2/
          cp -R ver3-ide-mockups/dist/. site/ver3/
          cp -R ver4-ai-copilot-worktrees/dist/. site/ver4/
          cp -R ver5-agent-swarm-worktrees/dist/. site/ver5/
          cp -R ver6-review-lab-worktrees/dist/. site/ver6/
          cp -R ver7-agent-workflows/dist/. site/ver7/
          cp -R ver8-concise-closing/dist/. site/ver8/
          cp -R ver9-agentic-ai/dist/. site/ver9/
          cp -R ver10-agentic-work-lanes/dist/. site/ver10/
          cp -R ver11-copilot-worktree-lanes/dist/. site/ver11/
          cp -R ver12-task-separation/dist/. site/ver12/
          cp -R ver13-official-resources/dist/. site/ver13/
          cp -R human-visual-refresh/dist/. site/human-visual-refresh/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
